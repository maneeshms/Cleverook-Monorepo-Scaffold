name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday 08:00 UTC — catches newly disclosed CVEs in existing deps.
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── npm audit (workspace + each self-contained frontend) ────────────────────
  audit:
    name: npm audit (${{ matrix.dir }})
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        # Root workspace + the two frontends that carry their own lockfile.
        dir: ['.', 'apps/web', 'apps/web-next']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install (${{ matrix.dir }})
        working-directory: ${{ matrix.dir }}
        run: npm ci --no-audit --no-fund
      # Block on CRITICAL. HIGH advisories without an available patch are reported
      # as an artifact rather than failing the pipeline (upgrade tracked separately).
      - name: Audit — block on CRITICAL
        working-directory: ${{ matrix.dir }}
        run: npm audit --audit-level=critical --omit=dev
      - name: Audit — full report (informational)
        if: always()
        working-directory: ${{ matrix.dir }}
        run: npm audit --json --omit=dev > audit.json || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: audit-${{ strategy.job-index }}
          path: ${{ matrix.dir }}/audit.json

  # ── Secret scanning ─────────────────────────────────────────────────────────
  # Uses the gitleaks binary directly — the gitleaks GitHub Action requires a paid
  # license for organization repos, the binary does not. Version pinned via env.
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    env:
      GITLEAKS_VERSION: 8.21.2
      # SHA-256 per platform archive (from the release checksums.txt) — the job
      # picks the one matching the runner OS/arch, so it runs on GitHub-hosted
      # Linux and self-hosted macs alike. Bump ALL of them whenever
      # GITLEAKS_VERSION changes — a mismatch fails the build instead of silently
      # running a tampered/swapped binary.
      GITLEAKS_SHA256_LINUX_X64: 5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
      GITLEAKS_SHA256_DARWIN_X64: 5b42c6e4b1fd693eaeb2b5b7faa5f17a1434299d4deb2de63d4b2efd7c753128
      GITLEAKS_SHA256_DARWIN_ARM64: cad3de5dc9a4d5447d967a70a4d49499c557f04db028274cc324f9ff983f6502
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the scan covers every commit
      - name: Run gitleaks
        run: |
          set -euo pipefail
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  suffix=linux_x64;    sha="$GITLEAKS_SHA256_LINUX_X64" ;;
            Darwin-x86_64) suffix=darwin_x64;   sha="$GITLEAKS_SHA256_DARWIN_X64" ;;
            Darwin-arm64)  suffix=darwin_arm64; sha="$GITLEAKS_SHA256_DARWIN_ARM64" ;;
            *) echo "Unsupported runner platform: $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          # Download to disk first, then verify BEFORE extracting — piping curl
          # straight into tar would run the archive before any integrity check.
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${suffix}.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          # shasum -a 256 (not sha256sum): present on both Linux and macOS runners.
          echo "${sha}  /tmp/gitleaks.tar.gz" | shasum -a 256 -c -
          tar -xz -C /tmp -f /tmp/gitleaks.tar.gz gitleaks
          /tmp/gitleaks detect --source . --redact --no-banner --exit-code 1

  # ── GitHub dependency review (PRs only) ─────────────────────────────────────
  # Needs the dependency graph + code scanning (GitHub Advanced Security; free on
  # public repos). Opt in with repo variable ENABLE_CODE_SCANNING=true once enabled.
  dependency-review:
    name: Dependency review (PRs only)
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    if: github.event_name == 'pull_request' && vars.ENABLE_CODE_SCANNING == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
