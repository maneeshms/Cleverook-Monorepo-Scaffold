name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Wednesday 08:00 UTC.
    - cron: '0 8 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    # CodeQL uploads results to code scanning (GitHub Advanced Security; free on
    # public repos). Set repo variable ENABLE_CODE_SCANNING=true once it's enabled
    # — until then this job is skipped so CI stays green on repos without it.
    # Fork PRs are skipped too: their read-only token can't upload SARIF, so the
    # analyze job would fail once the repo is public and takes fork contributions
    # (push + weekly schedule still cover the default branch).
    if: >-
      vars.ENABLE_CODE_SCANNING == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
