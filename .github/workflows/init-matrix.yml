name: Init Matrix

# Verifies the scaffold's promise: EVERY init.mjs combination (orm × frontend)
# produces a workspace that installs, builds, lints and unit-tests cleanly.
# The Expo mobile app rides the frontend axis instead of doubling the matrix:
# frontend=none also prunes mobile, every other job keeps it.
# Runs on demand and weekly so pruning logic never silently rots.
#
# NOTE: this workflow is removed from generated projects by init.mjs — it only
# belongs in the scaffold repo itself.

on:
  workflow_dispatch:
  schedule:
    # Every Sunday 06:00 UTC.
    - cron: '0 6 * * 0'

jobs:
  matrix:
    name: init --orm ${{ matrix.orm }} --frontend ${{ matrix.frontend }}
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        orm: [typeorm, prisma, both]
        frontend: [vite, next, both, none]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Materialize a generated project in a scratch dir
        run: |
          set -euo pipefail
          rm -rf /tmp/gen && cp -R . /tmp/gen && cd /tmp/gen
          node scripts/init.mjs --yes \
            --name demo-app \
            --scope @demo \
            --orm ${{ matrix.orm }} \
            --frontend ${{ matrix.frontend }} \
            --mobile ${{ matrix.frontend == 'none' && 'none' || 'expo' }} \
            --no-install
      - name: Install + build + lint + unit test the generated project
        working-directory: /tmp/gen
        run: |
          set -euo pipefail
          npm install
          npm run lint
          npm run build
          npm run test

  # Evolution tools: a minimal project must be able to grow — add a capability
  # later (scripts/add.mjs) and spawn new named apps (scripts/new-app.mjs).
  evolve:
    name: evolve (add + new-app in a generated project)
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Generate a minimal auth-only project
        run: |
          set -euo pipefail
          rm -rf /tmp/gen && cp -R . /tmp/gen && cd /tmp/gen
          node scripts/init.mjs --yes --name demo-app --scope @demo \
            --orm typeorm --frontend none --mobile none \
            --minimal --with-auth --no-install
      - name: add.mjs — enable messaging from the pristine checkout
        working-directory: /tmp/gen
        run: |
          set -euo pipefail
          node scripts/add.mjs messaging --from "$GITHUB_WORKSPACE" --no-install
          test -f docs/wiring-messaging.md
          test -d libs/messaging
          grep -q '"messaging"' .clevscaffold.json
      - name: new-app.mjs — create a backend + a web app with custom names
        working-directory: /tmp/gen
        run: |
          set -euo pipefail
          node scripts/new-app.mjs --type api --name billing --port 3002 \
            --from "$GITHUB_WORKSPACE" --no-install
          node scripts/new-app.mjs --type vite --name storefront \
            --from "$GITHUB_WORKSPACE" --no-install
          grep -q 'apps/billing' package.json
      - name: The evolved project still installs, builds, and tests green
        working-directory: /tmp/gen
        run: |
          set -euo pipefail
          npm install
          npm run build
          npm run test
          npx nx build storefront
          npx nx lint billing
