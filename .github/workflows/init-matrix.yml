name: Init Matrix

# Verifies the scaffold's promise: EVERY init.mjs combination (orm × frontend)
# produces a workspace that installs, builds, lints and unit-tests cleanly.
# Runs on demand and weekly so pruning logic never silently rots.
#
# NOTE: this workflow is removed from generated projects by init.mjs — it only
# belongs in the scaffold repo itself.

on:
  workflow_dispatch:
  schedule:
    # Every Sunday 06:00 UTC.
    - cron: '0 6 * * 0'

jobs:
  matrix:
    name: init --orm ${{ matrix.orm }} --frontend ${{ matrix.frontend }}
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        orm: [typeorm, prisma, both]
        frontend: [vite, next, both, none]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Materialize a generated project in a scratch dir
        run: |
          set -euo pipefail
          rm -rf /tmp/gen && cp -R . /tmp/gen && cd /tmp/gen
          node scripts/init.mjs --yes \
            --name demo-app \
            --scope @demo \
            --orm ${{ matrix.orm }} \
            --frontend ${{ matrix.frontend }} \
            --no-install
      - name: Install + build + lint + unit test the generated project
        working-directory: /tmp/gen
        run: |
          set -euo pipefail
          npm install
          npm run lint
          npm run build
          npm run test
