name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs opt into more only where needed.
permissions:
  contents: read

jobs:
  # ── Lint · typecheck · build · unit tests (with the 90% coverage gate) ──────
  verify:
    name: Lint + build + unit (coverage ≥90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc # single source of truth for the Node version
          cache: npm
      - run: npm ci
      # clevscaffold:prisma:start
      # Generate the Prisma client before typecheck/build/test — the api-prisma
      # sources import types from @prisma/client that only exist post-generate.
      - name: Generate Prisma client
        run: npm run prisma:generate
      # clevscaffold:prisma:end
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      # jest.preset.js enforces coverageThreshold 90% (branches/functions/lines/statements);
      # this step fails the build if any project drops below the floor.
      - run: npm run test

  # ── e2e against a real Postgres service container ────────────────────────────
  e2e:
    name: e2e (Postgres service)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Coordinates of the throwaway Postgres service above (not secrets).
      E2E_PG_BASE_URL: postgresql://postgres:postgres@localhost:5432
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clevscaffold_test
      # clevscaffold:prisma:start
      E2E_PRISMA_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clevscaffold_prisma_test
      # clevscaffold:prisma:end
      E2E_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      # Generate throwaway JWT secrets per run — never hardcode secrets in the workflow.
      - name: Generate ephemeral CI secrets
        run: |
          echo "JWT_ACCESS_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          echo "JWT_REFRESH_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - run: npm ci
      # clevscaffold:prisma:start
      - run: npm run prisma:generate
      # clevscaffold:prisma:end
      # Creates + migrates the disposable test databases (per configured ORM).
      - run: npm run e2e:setup
      - run: npm run e2e

  # ── Docker build + vulnerability scan + SBOM for every deployable app ────────
  docker:
    name: Docker build + scan (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # required by upload-sarif to read workflow run metadata
      security-events: write # upload Trivy SARIF to code scanning (when enabled)
    strategy:
      fail-fast: false
      matrix:
        app: [api, api-prisma, web, web-next]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      # Local CI image tag derived from the repo name (no hardcoded project name),
      # lowercased because Docker repository names must be lowercase.
      - name: Compute image tag
        run: echo "IMAGE=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')-${{ matrix.app }}:ci" >> "$GITHUB_ENV"
      - name: Build ${{ matrix.app }} image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
      # Fail the build on CRITICAL image vulnerabilities; report HIGH informationally.
      - name: Trivy image scan (${{ matrix.app }})
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Trivy gate — fail on CRITICAL
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      # SARIF upload needs code scanning (GitHub Advanced Security; free on public
      # repos). Opt in by setting the repo variable ENABLE_CODE_SCANNING=true once
      # it's available — the CRITICAL gate above already runs everywhere. Skipped
      # for fork PRs: their read-only GITHUB_TOKEN lacks security-events:write, so
      # the upload would fail once the repo is public and accepts fork PRs.
      - name: Upload Trivy SARIF
        if: >-
          always() && vars.ENABLE_CODE_SCANNING == 'true' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}
      # Generate an SPDX SBOM for supply-chain provenance.
      - name: Generate SBOM (${{ matrix.app }})
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          output-file: sbom-${{ matrix.app }}.spdx.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom-${{ matrix.app }}
          path: sbom-${{ matrix.app }}.spdx.json
