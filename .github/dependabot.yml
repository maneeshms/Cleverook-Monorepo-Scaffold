version: 2
# Keeps dependencies + GitHub Actions current, and lets you pin actions to SHAs
# and have Dependabot bump them safely.
#
# Noise control: related packages are grouped into one PR, and — importantly —
# for the npm ecosystems (root + each frontend) EVERY major bump is funnelled
# into a single, isolated "major-updates" PR. Routine minor/patch updates stay
# safe to merge; the risky majors are batched into one PR you review (or hold)
# deliberately. GitHub Actions and Docker base-image bumps are low-risk tag
# moves and stay grouped (no separate major PR). To stop seeing npm majors
# entirely, replace the `major-updates` group with an `ignore` entry:
#   ignore:
#     - dependency-name: '*'
#       update-types: ['version-update:semver-major']
# clevscaffold:scaffold:start
#
# The `clevscaffold:<orm|frontend>:start/end` sentinels below are pruned by
# scripts/init.mjs so a generated project never references an app it doesn't
# have (e.g. a Prisma-only, no-frontend project drops the api/web/web-next blocks).
# clevscaffold:scaffold:end
updates:
  # Root workspace (NestJS backends + libs)
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nest:
        patterns: ['@nestjs/*']
        update-types: ['minor', 'patch']
      types:
        patterns: ['@types/*']
        update-types: ['minor', 'patch']
      dev-tooling:
        patterns: ['eslint*', 'prettier', 'jest', 'ts-*', 'typescript*', '@nx/*', 'nx']
        update-types: ['minor', 'patch']
      # Every major bump (any package) lands here — one isolated PR to review.
      major-updates:
        patterns: ['*']
        update-types: ['major']
    ignore:
      # TypeScript 7 (the native port) is the hard blocker: typescript-eslint@8
      # peers require `typescript >=4.8.4 <6.1.0`, and Nx/NestJS don't support TS 7
      # yet — a major bump can't even `npm install`. ESLint 10 is peer-allowed by
      # typescript-eslint but pinned here as a deliberate stability choice (bump it
      # in a coordinated pass, not automatically). Remove the `typescript` pin once
      # typescript-eslint supports TS 7.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']

  # clevscaffold:vite:start
  # Vite frontend (own lockfile)
  - package-ecosystem: npm
    directory: '/apps/web'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']
      major-updates:
        patterns: ['*']
        update-types: ['major']
    ignore:
      # See root note: typescript-eslint@8 blocks TypeScript 7 / ESLint 10.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
  # clevscaffold:vite:end

  # clevscaffold:next:start
  # Next.js frontend (own lockfile)
  - package-ecosystem: npm
    directory: '/apps/web-next'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']
      major-updates:
        patterns: ['*']
        update-types: ['major']
    ignore:
      # See root note: typescript-eslint@8 blocks TypeScript 7 / ESLint 10.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
  # clevscaffold:next:end

  # clevscaffold:expo:start
  # Expo React Native app (own lockfile). No typescript/eslint major pin here —
  # eslint-config-expo owns that toolchain and moves with the Expo SDK, but every
  # major still lands in the isolated major-updates PR. Prefer `npx expo install`
  # (SDK-compatible versions) when bumping expo-* packages manually.
  - package-ecosystem: npm
    directory: '/apps/mobile'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']
      major-updates:
        patterns: ['*']
        update-types: ['major']
  # clevscaffold:expo:end

  # GitHub Actions — bump (and, once SHA-pinned, re-pin) third-party actions.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']

  # Dockerfiles — base image updates (one entry per deployable app).
  - package-ecosystem: docker
    directories:
      # clevscaffold:typeorm:start
      - '/apps/api'
      # clevscaffold:typeorm:end
      # clevscaffold:prisma:start
      - '/apps/api-prisma'
      # clevscaffold:prisma:end
      # clevscaffold:vite:start
      - '/apps/web'
      # clevscaffold:vite:end
      # clevscaffold:next:start
      - '/apps/web-next'
      # clevscaffold:next:end
    schedule:
      interval: weekly
